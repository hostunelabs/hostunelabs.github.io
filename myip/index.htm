<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Public IP Address</title><style> body{ margin:0; font-family:Arial, sans-serif; background:#f4f6f8; display:flex; justify-content:center; align-items:center; height:100vh; } .card{ background:#fff; padding:30px; width:360px; border-radius:14px; box-shadow:0 8px 24px rgba(0,0,0,.08); text-align:center; } h1{ margin:0 0 20px; font-size:24px; } .ip{ font-size:42px; font-weight:bold; color:#0a66c2; margin:18px 0; min-height:40px; word-break:break-word; } .status{ color:#666; font-size:16px; min-height:20px; margin-top:10px; } .buttons{ margin-top:18px; display:flex; gap:10px; justify-content:center; } button{ padding:10px 18px; border:none; border-radius:8px; color:#fff; cursor:pointer; font-size:15px; } .refresh{ background:#0a66c2; } .refresh:hover{ background:#084f98; } .copy{ background:#16a34a; } .copy:hover{ background:#12803a; } .hidden{ display:none !important; }</style></head><body><div class="card"><h1>Your Public IP</h1><div class="ip" id="ipBox">Loading...</div><div class="status" id="status">Please wait</div><div class="buttons"><button id="refreshBtn" class="refresh hidden" onclick="loadIP()">Refresh</button><button id="copyBtn" class="copy hidden" onclick="copyIP()">Copy</button></div></div><script>async function getFromAws() { const res = await fetch("https://checkip.amazonaws.com", { cache: "no-store" }); if (!res.ok) throw new Error(); const ip = (await res.text()).trim(); if (!ip) throw new Error(); return ip;}async function getFromIpify() { const res = await fetch("https://api.ipify.org?format=json", { cache: "no-store" }); if (!res.ok) throw new Error(); const data = await res.json(); if (!data.ip) throw new Error(); return data.ip;}async function loadIP() { const ipBox = document.getElementById("ipBox"); const status = document.getElementById("status"); const refreshBtn = document.getElementById("refreshBtn"); const copyBtn = document.getElementById("copyBtn"); refreshBtn.classList.add("hidden"); copyBtn.classList.add("hidden"); ipBox.textContent = "Loading..."; status.textContent = "Please wait"; try { const ip = await getFromAws(); renderSuccess(ip); } catch { try { const ip = await getFromIpify(); renderSuccess(ip); } catch { renderFailure(); } } function renderSuccess(ip) { ipBox.textContent = ip; status.textContent = ""; copyBtn.classList.remove("hidden"); } function renderFailure() { ipBox.textContent = "Unavailable"; status.textContent = "Unable to fetch IP"; refreshBtn.classList.remove("hidden"); }}async function copyIP() { const ip = document.getElementById("ipBox").textContent; const status = document.getElementById("status"); try { await navigator.clipboard.writeText(ip); status.textContent = "Copied to clipboard"; setTimeout(() => { if(status.textContent === "Copied to clipboard") status.textContent = ""; }, 2000); } catch { status.textContent = "Copy failed"; }}loadIP();</script></body></html>
