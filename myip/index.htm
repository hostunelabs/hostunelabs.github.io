<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP & Port Checker</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1a1a1a;
        }

        .card {
            background: #fff;
            padding: 32px;
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            margin: 20px;
        }

        .section-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 4px;
        }

        .ip {
            font-size: 36px;
            font-weight: 800;
            color: #0a66c2;
            margin: 10px 0;
            min-height: 44px;
            word-break: break-all;
            line-height: 1.2;
        }

        .status-msg {
            font-size: 14px;
            min-height: 20px;
            margin-bottom: 15px;
            transition: color 0.3s;
        }

        .divider {
            height: 1px;
            background: #eee;
            margin: 24px 0;
        }

        .port-checker { text-align: left; }

        .input-group {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #0a66c2; }

        .buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: opacity 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-primary { background: #0a66c2; }
        .btn-primary:hover:not(:disabled) { background: #084f98; }

        .btn-secondary { background: #16a34a; }
        .btn-secondary:hover:not(:disabled) { background: #12803a; }

        .port-result {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            text-align: center;
            display: none;
            font-size: 13px;
            line-height: 1.5;
        }

        .port-open   { display: block; background: #dcfce7; color: #166534; }
        .port-closed { display: block; background: #fee2e2; color: #991b1b; }

        .hidden { display: none !important; }

        .loader {
            border: 2px solid #ffffff44;
            border-top: 2px solid #fff;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="section-label">Your Public IP</div>
    <div class="ip" id="ipBox">Loading...</div>
    <div id="ipStatus" class="status-msg" style="color:#666;">Detecting network...</div>

    <div class="buttons">
        <button id="copyBtn" class="btn-secondary hidden" onclick="copyIP()">Copy IP</button>
        <button id="refreshBtn" class="btn-primary hidden" onclick="loadIP()">Refresh</button>
    </div>

    <div class="divider"></div>

    <div class="port-checker">
        <div class="section-label">Check Open Port</div>
        <div class="input-group">
            <input type="number" id="portInput" placeholder="Port (e.g. 80, 443, 8080)" min="1" max="65535"
                   onkeydown="if(event.key==='Enter') checkPort()">
            <button id="checkBtn" class="btn-primary" onclick="checkPort()">Check</button>
        </div>
        <div id="portResult" class="port-result"></div>
    </div>
</div>

<script>
    let currentIp = "";

    // ── IP Detection ─────────────────────────────────────────────
    async function loadIP() {
        const ipBox      = document.getElementById("ipBox");
        const ipStatus   = document.getElementById("ipStatus");
        const refreshBtn = document.getElementById("refreshBtn");
        const copyBtn    = document.getElementById("copyBtn");

        refreshBtn.classList.add("hidden");
        copyBtn.classList.add("hidden");
        ipBox.textContent    = "Loading...";
        ipStatus.textContent = "Fetching address...";
        ipStatus.style.color = "#666";

        const sources = [
            () => fetch("https://api.ipify.org?format=json", { cache: "no-store" }).then(r => r.json()).then(d => d.ip),
            () => fetch("https://checkip.amazonaws.com",      { cache: "no-store" }).then(r => r.text()).then(t => t.trim()),
            () => fetch("https://api64.ipify.org?format=json",{ cache: "no-store" }).then(r => r.json()).then(d => d.ip),
        ];

        for (const source of sources) {
            try {
                const ip = await source();
                if (ip) { currentIp = ip; renderSuccess(ip); return; }
            } catch {}
        }
        renderFailure();

        function renderSuccess(ip) {
            ipBox.textContent    = ip;
            ipStatus.textContent = "Successfully detected";
            ipStatus.style.color = "#16a34a";
            copyBtn.classList.remove("hidden");
            refreshBtn.classList.add("hidden");
        }
        function renderFailure() {
            ipBox.textContent    = "Offline";
            ipStatus.textContent = "Unable to fetch public IP";
            ipStatus.style.color = "#dc2626";
            refreshBtn.classList.remove("hidden");
        }
    }

    async function copyIP() {
        const ipStatus = document.getElementById("ipStatus");
        try {
            await navigator.clipboard.writeText(currentIp);
        } catch {
            const ta = document.createElement("textarea");
            ta.value = currentIp;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
        }
        const orig = ipStatus.textContent;
        ipStatus.textContent = "Copied to clipboard!";
        ipStatus.style.color = "#16a34a";
        setTimeout(() => { ipStatus.textContent = orig; ipStatus.style.color = "#16a34a"; }, 2000);
    }

    // ── Port Check via Hostune API ────────────────────────────────
    async function checkPort() {
        const portInput = document.getElementById("portInput");
        const checkBtn  = document.getElementById("checkBtn");
        const port      = parseInt(portInput.value);

        if (!currentIp || currentIp === "Offline" || currentIp === "Loading...") {
            showPortResult("Waiting for IP address...", "port-closed"); return;
        }
        if (!port || port < 1 || port > 65535) {
            showPortResult("Enter a valid port (1–65535)", "port-closed"); return;
        }

        checkBtn.disabled  = true;
        checkBtn.innerHTML = '<span class="loader"></span>Checking...';
        document.getElementById("portResult").style.display = "none";

        try {
            const headers = new Headers();
            headers.append('Content-Type', 'application/json');

            const response = await fetch('https://app.hostune.in/api/hosp/port-check', {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({ ip_address: currentIp, port_number: port })
            });

            const result = await response.json();

            if (result.status === true || result.open === true || result.is_open === true) {
                showPortResult(`✓  Port ${port} is OPEN`, "port-open");
            } else {
                showPortResult(`✗  Port ${port} is CLOSED or filtered`, "port-closed");
            }
        } catch (error) {
            showPortResult("Check failed. Please try again.", "port-closed");
        }

        checkBtn.disabled    = false;
        checkBtn.textContent = "Check";
    }

    function showPortResult(text, className) {
        const el = document.getElementById("portResult");
        el.innerText     = text;
        el.className     = `port-result ${className}`;
        el.style.display = "block";
    }

    window.onload = loadIP;
</script>
</body>
</html>
